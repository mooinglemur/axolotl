workflow:
  rules:
    - if: $CI_SERVER_HOST == "git.mooinglemur.com"

image: ubuntu:22.04

stages:
  - build

linux-flatpak:
  image: bilelmoussaoui/flatpak-github-actions:freedesktop-23.08
  stage: build
  tags:
    - docker-sandboxed
    - linux
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
    FLATPAK_BUILDER_NO_USER_CHROOT: "1"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - when: manual
  hooks:
    pre_get_sources_script:
      - apt update && DEBIAN_FRONTEND=noninteractive apt install -y git curl
      - curl -L -o /usr/local/bin/gitlab-runner https://gitlab-runner-downloads.s3.amazonaws.com/latest/binaries/gitlab-runner-linux-amd64
      - chmod +x /usr/local/bin/gitlab-runner
  script:
    - flatpak-builder --user --disable-rofiles-fuse --force-clean --ccache build-dir com.mooinglemur.axolotl.yml
    - flatpak build-export repo build-dir
    - flatpak build-bundle repo axolotl-apclient.flatpak com.mooinglemur.axolotl
  artifacts:
    name: "axolotl-apclient-flatpak"
    expire_in: 1 week
    paths:
      - axolotl-apclient.flatpak

linux-appimage:
  stage: build
  tags:
    - docker
    - linux
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - when: manual
  hooks:
    pre_get_sources_script:
      - apt update && DEBIAN_FRONTEND=noninteractive apt install -y git
  before_script:
    - apt update && DEBIAN_FRONTEND=noninteractive apt install -y cmake ninja-build build-essential libgl1-mesa-dev libfontconfig1-dev libglfw3-dev nlohmann-json3-dev libyaml-cpp-dev libssl-dev libmbedtls-dev git wget file python3
    - wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
    - chmod +x linuxdeploy-x86_64.AppImage
    - wget https://curl.se/ca/cacert.pem
  script:
    - |
      mkdir build && cd build
      cmake -GNinja -DCMAKE_BUILD_TYPE=Release -DUSE_MBED_TLS=ON -DUSE_OPEN_SSL=OFF ..
      cd ..
      cat <<'EOF' > mbed_patch.py
      import sys
      file_path = "thirdparty/IXWebSocket/ixwebsocket/IXSocketMbedTLS.cpp"
      with open(file_path, 'r') as f:
          content = f.read()
      content = content.replace('#include <string.h>', '#include <string.h>\n#include <mbedtls/version.h>\n#if MBEDTLS_VERSION_MAJOR >= 3\n#include <psa/crypto.h>\n#endif')
      content = content.replace('psa_crypto_init();', '#if MBEDTLS_VERSION_MAJOR >= 3\n            psa_crypto_init();\n#endif')
      content = content.replace('mbedtls_psa_crypto_free();', '#if MBEDTLS_VERSION_MAJOR >= 3\n            mbedtls_psa_crypto_free();\n#endif')
      content = content.replace('#ifdef IXWEBSOCKET_USE_MBED_TLS_MIN_VERSION_3', '#if MBEDTLS_VERSION_MAJOR >= 3')
      with open(file_path, 'w') as f:
          f.write(content)
      EOF
      python3 mbed_patch.py
      cd build
      ninja
      DESTDIR=appdir ninja install
      mkdir -p appdir/usr/local/share/axolotl
      cp ../cacert.pem appdir/usr/local/share/axolotl/
      cd ..
      export EXCLUDE_LIBS="libssl.so.3;libcrypto.so.3;libssl.so.1.1;libcrypto.so.1.1"
      ./linuxdeploy-x86_64.AppImage --appimage-extract-and-run --appdir build/appdir --executable build/appdir/usr/local/bin/axolotl-apclient --desktop-file com.mooinglemur.axolotl.desktop --icon-file com.mooinglemur.axolotl.png --output appimage
  artifacts:
    name: "axolotl-apclient-appimage"
    expire_in: 1 week
    paths:
      - "*.AppImage"

windows:
  stage: build
  tags:
    - windows
  image: mcr.microsoft.com/windows/servercore:ltsc2022
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - when: manual
  before_script:
    - |
      $ErrorActionPreference = "Stop"
      echo "Downloading MSYS2..."
      Invoke-WebRequest -Uri "https://github.com/msys2/msys2-installer/releases/download/2024-01-13/msys2-base-x86_64-20240113.sfx.exe" -OutFile "msys2-base.exe"
      echo "Extracting MSYS2..."
      .\msys2-base.exe -y -oc:\
      $env:PATH = "C:\msys64\usr\bin;C:\msys64\mingw64\bin;" + $env:PATH
      echo "Updating MSYS2 packages..."
      c:\msys64\usr\bin\bash -lc "pacman --noconfirm -Syu"
      c:\msys64\usr\bin\bash -lc "pacman --noconfirm -Syu"
      echo "Installing build tools and dependencies..."
      c:\msys64\usr\bin\bash -lc "pacman -S --noconfirm mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja mingw-w64-x86_64-glfw mingw-w64-x86_64-yaml-cpp mingw-w64-x86_64-nlohmann-json mingw-w64-x86_64-mbedtls mingw-w64-x86_64-zlib mingw-w64-x86_64-python"
      echo "Downloading WiX Toolset..."
      Invoke-WebRequest -Uri "https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311-binaries.zip" -OutFile "wix.zip"
      Expand-Archive -Path "wix.zip" -DestinationPath "C:\wix"
      $env:PATH = "C:\wix;" + $env:PATH
  script:
    - |
      $ErrorActionPreference = "Stop"
      $env:PATH = "C:\msys64\usr\bin;C:\msys64\mingw64\bin;C:\wix;" + $env:PATH
      $env:MSYS2_PATH_TYPE = "inherit"
      $env:CHERE_INVOKING = "1"
      $env:MSYSTEM = "MINGW64"

      function Run-Bash {
          param([string]$command)
          c:\msys64\usr\bin\bash -lc $command
          if ($LASTEXITCODE -ne 0) {
              Write-Error "Bash command failed with exit code ${LASTEXITCODE}: $command"
              exit $LASTEXITCODE
          }
      }

      if (!(Test-Path build)) { mkdir build }
      cd build

      echo "Configuring with CMake..."
      Run-Bash "cmake -GNinja -DCMAKE_BUILD_TYPE=Release -DUSE_MBED_TLS=ON -DUSE_OPEN_SSL=OFF .."

      echo "Patching IXWebSocket..."
      $patchScript = @'
      import os
      file_path = "thirdparty/IXWebSocket/ixwebsocket/IXSocketMbedTLS.cpp"
      with open(file_path, 'r') as f:
          content = f.read()
      content = content.replace('#include <string.h>', '#include <string.h>\n#include <mbedtls/version.h>\n#if MBEDTLS_VERSION_MAJOR >= 3\n#include <psa/crypto.h>\n#endif')
      content = content.replace('psa_crypto_init();', '#if MBEDTLS_VERSION_MAJOR >= 3\n            psa_crypto_init();\n#endif')
      content = content.replace('mbedtls_psa_crypto_free();', '#if MBEDTLS_VERSION_MAJOR >= 3\n            mbedtls_psa_crypto_free();\n#endif')
      content = content.replace('#ifdef IXWEBSOCKET_USE_MBED_TLS_MIN_VERSION_3', '#if MBEDTLS_VERSION_MAJOR >= 3')
      with open(file_path, 'w') as f:
          f.write(content)
      '@
      $patchScript | Out-File -FilePath ../mbed_patch.py -Encoding ascii
      Run-Bash "cd .. && python3 mbed_patch.py"

      echo "Building..."
      Run-Bash "ninja"

      echo "Generating MSI and ZIP via CPack..."
      Run-Bash "cpack -G WIX"
      Run-Bash "cpack -G ZIP"

      cd ..
      echo "Organizing artifacts..."
      Get-ChildItem -Path build -Filter "*.zip" | Move-Item -Destination "axolotl-apclient-windows-portable.zip" -Force
  artifacts:
    name: "axolotl-apclient-windows"
    expire_in: 1 week
    paths:
      - "axolotl-apclient-windows-portable.zip"
      - "build/*.msi"

windows-cross:
  stage: build
  tags:
    - docker
    - linux
  image: ubuntu:22.04
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - when: manual
  hooks:
    pre_get_sources_script:
      - apt update && DEBIAN_FRONTEND=noninteractive apt install -y git curl
      - curl -L -o /usr/local/bin/gitlab-runner https://gitlab-runner-downloads.s3.amazonaws.com/latest/binaries/gitlab-runner-linux-amd64
      - chmod +x /usr/local/bin/gitlab-runner
  before_script:
    - apt update && DEBIAN_FRONTEND=noninteractive apt install -y cmake ninja-build build-essential binutils-mingw-w64-x86-64 gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 msitools wixl zip curl git python3
    - export ROOT_DIR=$PWD
    - export CMAKE_GENERATOR=Ninja
    # Patch IXWebSocket for case-insensitive linking on Linux and missing bcrypt dependency for mbedtls
    - sed -i 's/Crypt32/crypt32 bcrypt/g' thirdparty/IXWebSocket/CMakeLists.txt
    # Build zlib for mingw
    - git clone --depth 1 -b v1.3.1 https://github.com/madler/zlib.git
    - mkdir zlib/build && cd zlib/build
    - cmake -GNinja -DCMAKE_TOOLCHAIN_FILE=$ROOT_DIR/Toolchain-mingw.cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DCMAKE_INSTALL_PREFIX=/usr/x86_64-w64-mingw32 ..
    - ninja install
    # -- Remove the dll and dll.a files so that the static library is used
    - rm -f /usr/x86_64-w64-mingw32/lib/libzlib.dll.a /usr/x86_64-w64-mingw32/bin/libzlib.dll
    - cd $ROOT_DIR
    # Build nlohmann_json for mingw
    - git clone --depth 1 -b v3.11.3 https://github.com/nlohmann/json.git
    - mkdir json/build && cd json/build
    - cmake -GNinja -DCMAKE_TOOLCHAIN_FILE=$ROOT_DIR/Toolchain-mingw.cmake -DJSON_BuildTests=OFF -DCMAKE_INSTALL_PREFIX=/usr/x86_64-w64-mingw32 ..
    - ninja install
    - cd $ROOT_DIR
    # Build mbedtls for mingw
    - git clone --depth 1 -b v3.5.2 https://github.com/ARMmbed/mbedtls.git
    - mkdir mbedtls/build && cd mbedtls/build
    - cmake -GNinja -DCMAKE_TOOLCHAIN_FILE=$ROOT_DIR/Toolchain-mingw.cmake -DCMAKE_BUILD_TYPE=Release -DENABLE_TESTING=OFF -DENABLE_PROGRAMS=OFF -DUSE_SHARED_MBEDTLS_LIBRARY=OFF -DCMAKE_INSTALL_PREFIX=/usr/x86_64-w64-mingw32 ..
    - ninja install
    - cd $ROOT_DIR
    # Build yaml-cpp for mingw
    - git clone --depth 1 -b 0.8.0 https://github.com/jbeder/yaml-cpp.git
    - mkdir yaml-cpp/build && cd yaml-cpp/build
    - cmake -GNinja -DCMAKE_TOOLCHAIN_FILE=$ROOT_DIR/Toolchain-mingw.cmake -DCMAKE_BUILD_TYPE=Release -DYAML_CPP_BUILD_TESTS=OFF -DYAML_CPP_BUILD_TOOLS=OFF -DYAML_BUILD_SHARED_LIBS=OFF -DCMAKE_INSTALL_PREFIX=/usr/x86_64-w64-mingw32 ..
    - ninja install
    - cd $ROOT_DIR
    # Build glfw for mingw
    - git clone --depth 1 -b 3.3.10 https://github.com/glfw/glfw.git
    - mkdir glfw/build && cd glfw/build
    - cmake -GNinja -DCMAKE_TOOLCHAIN_FILE=$ROOT_DIR/Toolchain-mingw.cmake -DCMAKE_BUILD_TYPE=Release -DGLFW_BUILD_EXAMPLES=OFF -DGLFW_BUILD_TESTS=OFF -DGLFW_BUILD_DOCS=OFF -DBUILD_SHARED_LIBS=OFF -DCMAKE_INSTALL_PREFIX=/usr/x86_64-w64-mingw32 ..
    - ninja install
    - cd $ROOT_DIR

    # -- AGGRESSIVE CLEANUP: Remove ANY and ALL dll and import library remnants to force absolute static linking
    - find /usr/x86_64-w64-mingw32 -name "*.dll" -delete
    - find /usr/x86_64-w64-mingw32 -name "*.dll.a" -delete
  script:
    - |
      mkdir build-cross && cd build-cross
      cmake -GNinja -DCMAKE_TOOLCHAIN_FILE=$PWD/../Toolchain-mingw.cmake -DCMAKE_BUILD_TYPE=Release -DUSE_MBED_TLS=ON -DUSE_OPEN_SSL=OFF ..
      cd ..
      sed -i 's/Crypt32/crypt32 bcrypt/g' thirdparty/IXWebSocket/CMakeLists.txt
      cat <<'EOF' > mbed_patch.py
      import sys
      file_path = "thirdparty/IXWebSocket/ixwebsocket/IXSocketMbedTLS.cpp"
      with open(file_path, 'r') as f:
          content = f.read()
      content = content.replace('#include <string.h>', '#include <string.h>\n#include <mbedtls/version.h>\n#if MBEDTLS_VERSION_MAJOR >= 3\n#include <psa/crypto.h>\n#endif')
      content = content.replace('psa_crypto_init();', '#if MBEDTLS_VERSION_MAJOR >= 3\n            psa_crypto_init();\n#endif')
      content = content.replace('mbedtls_psa_crypto_free();', '#if MBEDTLS_VERSION_MAJOR >= 3\n            mbedtls_psa_crypto_free();\n#endif')
      content = content.replace('#ifdef IXWEBSOCKET_USE_MBED_TLS_MIN_VERSION_3', '#if MBEDTLS_VERSION_MAJOR >= 3')
      with open(file_path, 'w') as f:
          f.write(content)
      EOF
      python3 mbed_patch.py
      cd build-cross
      ninja
    - echo "Generating MSI via wixl..."
    - |
      cat <<EOF > axolotl.wxs
      <?xml version="1.0" encoding="utf-8"?>
      <Wix xmlns="http://schemas.microsoft.com/wix/2006/wi">
        <Product Name="Axolotl AP Text Client" Id="*" UpgradeCode="425C992D-0261-4162-8AFA-57E2BBA737D4" Language="1033" Codepage="1252" Version="0.1.0" Manufacturer="MooingLemur">
          <Package Id="*" Keywords="Installer" Description="Axolotl Archipelago text client" Manufacturer="MooingLemur" InstallerVersion="100" Languages="1033" Compressed="yes" SummaryCodepage="1252" />
          <Media Id="1" Cabinet="Sample.cab" EmbedCab="yes" DiskPrompt="CD-ROM #1" />
          <Property Id="DiskPrompt" Value="Axolotl AP Text Client Installation [1]" />

          <Directory Id="TARGETDIR" Name="SourceDir">
            <Directory Id="ProgramFilesFolder" Name="PFiles">
              <Directory Id="AxolotlDir" Name="AxolotlAPTextClient">
                <Component Id="MainExecutable" Guid="*">
                  <File Id="AxolotlEXE" Name="axolotl-apclient.exe" Source="axolotl-apclient.exe" KeyPath="yes">
                    <Shortcut Id="startmenuAxolotl" Directory="ProgramMenuDir" Name="Axolotl AP Text Client" WorkingDirectory="INSTALLDIR" Icon="AxolotlIcon.exe" IconIndex="0" Advertise="yes" />
                  </File>
                </Component>
                <Component Id="LicenseFile" Guid="*">
                  <File Id="LicenseTXT" Name="LICENSE.txt" Source="../LICENSE.txt" />
                </Component>
              </Directory>
            </Directory>
            <Directory Id="ProgramMenuFolder" Name="Programs">
              <Directory Id="ProgramMenuDir" Name="Axolotl AP Text Client">
                <Component Id="ProgramMenuDir" Guid="*">
                  <RemoveFolder Id="ProgramMenuDir" On="uninstall" />
                  <RegistryValue Root="HKCU" Key="Software\MooingLemur\AxolotlAPTextClient" Type="string" Value="" KeyPath="yes" />
                </Component>
              </Directory>
            </Directory>
          </Directory>

          <Icon Id="AxolotlIcon.exe" SourceFile="axolotl-apclient.exe" />

          <Feature Id="Complete" Level="1">
            <ComponentRef Id="MainExecutable" />
            <ComponentRef Id="LicenseFile" />
            <ComponentRef Id="ProgramMenuDir" />
          </Feature>
        </Product>
      </Wix>
      EOF
    - wixl -o axolotl-apclient-cross.msi axolotl.wxs
    - echo "Creating portable ZIP..."
    - zip -j ../axolotl-apclient-windows-cross-portable.zip axolotl-apclient.exe
  artifacts:
    name: "axolotl-apclient-windows-cross"
    expire_in: 1 week
    paths:
      - "axolotl-apclient-windows-cross-portable.zip"
      - "build-cross/*.msi"



