<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Axolotl Overview</title>
    <link rel="stylesheet" href="overview.css">
</head>

<body>
    <div id="overview-container">
        <div id="progress-container">
            <div id="progress-bar-track">
                <div id="progress-bar-fill"></div>
            </div>
            <div id="progress-text">
                <span id="progress-percent">0.0%</span>
                <span class="progress-counts">
                    (<span id="checked-locations">0</span>/<span id="total-locations">0</span>)
                </span>
            </div>
        </div>
        <div id="games-container">
            <div id="games-text">
                <span class="games-count">
                    <span id="completed-games">0</span>/<span id="total-games">0</span>
                </span>
                <span class="games-label">Games Finished</span>
            </div>
        </div>
    </div>
    <script src="overview.js"></script>
</body>

</html>
