name: Top of Tree Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yml

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename and Prepare Assets
        run: |
          sudo apt-get install -y unzip
          mkdir -p release_assets
          # Linux
          find artifacts/axolotl-apclient-appimage -name "Axolotl*.AppImage" -exec cp {} release_assets/AxolotlAPTextClient-Linux-x86_64-latest.AppImage \; || true
          find artifacts/axolotl-apclient-flatpak -name "*.flatpak" -exec cp {} release_assets/com.mooinglemur.axolotl-latest.flatpak \; || true
          # macOS
          find artifacts/axolotl-apclient-macos -name "*.dmg" -exec cp {} release_assets/AxolotlAPTextClient-macOS-latest.dmg \; || true
          # Windows Native
          if [ -f artifacts/axolotl-apclient-windows/axolotl-apclient-windows-portable.zip ]; then
            unzip artifacts/axolotl-apclient-windows/axolotl-apclient-windows-portable.zip -d native_temp
            find native_temp -name axolotl-apclient.exe -exec cp {} release_assets/AxolotlAPTextClient-Windows-Native-latest.exe \; || true
          fi
          find artifacts/axolotl-apclient-windows -name "*.msi" -exec cp {} release_assets/AxolotlAPTextClient-Windows-Native-latest.msi \; || true
          # Windows Cross
          if [ -f artifacts/axolotl-apclient-windows-cross/axolotl-apclient-windows-cross-portable.zip ]; then
            unzip artifacts/axolotl-apclient-windows-cross/axolotl-apclient-windows-cross-portable.zip -d cross_temp
            mv cross_temp/axolotl-apclient.exe release_assets/AxolotlAPTextClient-Windows-Static-latest.exe
          fi
          find artifacts/axolotl-apclient-windows-cross -name "*.msi" -exec cp {} release_assets/AxolotlAPTextClient-Windows-Static-latest.msi \; || true

      - name: Recreate Latest Tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true

      - name: Create New Latest Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: latest
          commit: main
          name: Latest Top-of-Tree Build
          body: |
            Automated development builds from the `main` branch.

            Most recent commit: [${{ github.event.head_commit.message }}](${{ github.event.head_commit.url }})

            **Direct Downloads**:

            **Linux**:
            - [Linux AppImage](https://github.com/${{ github.repository }}/releases/download/latest/AxolotlAPTextClient-Linux-x86_64-latest.AppImage)
            - [Linux Flatpak](https://github.com/${{ github.repository }}/releases/download/latest/com.mooinglemur.axolotl-latest.flatpak)

            **macOS**:
            - [macOS DMG](https://github.com/${{ github.repository }}/releases/download/latest/AxolotlAPTextClient-macOS-latest.dmg)

            **Windows**:  
            The two sets of Windows builds should behave identically to each other, but both are provided for testing purposes.

            *Windows MSYS2 Builds*:
            - [MSI Installer](https://github.com/${{ github.repository }}/releases/download/latest/AxolotlAPTextClient-Windows-Native-latest.msi)
            - [Portable EXE](https://github.com/${{ github.repository }}/releases/download/latest/AxolotlAPTextClient-Windows-Native-latest.exe)

            *Windows Mingw-w64 Cross-Compiled Builds*:
            - [MSI Installer](https://github.com/${{ github.repository }}/releases/download/latest/AxolotlAPTextClient-Windows-Static-latest.msi)
            - [Portable EXE](https://github.com/${{ github.repository }}/releases/download/latest/AxolotlAPTextClient-Windows-Static-latest.exe)
          artifacts: release_assets/*
          prerelease: true
          replacesArtifacts: true
          makeLatest: true
