name: Release

on:
  schedule:
    - cron: '5 7 * * *' # Nightly builds at 7:05 AM UTC
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yml

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Rename and Prepare Assets
        run: |
          sudo apt-get install -y unzip
          mkdir -p release_assets
          # Move and rename assets for clarity and include 'nightly' in filenames
          mv artifacts/*.AppImage release_assets/AxolotlAPTextClient-Linux-x86_64-nightly.AppImage || true
          mv artifacts/*.flatpak release_assets/com.mooinglemur.axolotl-nightly.flatpak || true
          mv artifacts/*.dmg release_assets/AxolotlAPTextClient-macOS-nightly.dmg || true

          # For Windows
          # MSIs
          find artifacts -name "*.msi" -exec cp {} release_assets/AxolotlAPTextClient-Windows-nightly.msi \; || true

          # Portable EXE
          # We prefer the one from windows-cross as it's definitely a single static binary
          if [ -f artifacts/axolotl-apclient-windows-cross-portable.zip ]; then
            unzip artifacts/axolotl-apclient-windows-cross-portable.zip -d cross_temp
            mv cross_temp/axolotl-apclient.exe release_assets/AxolotlAPTextClient-Windows-nightly.exe
          elif [ -f artifacts/axolotl-apclient-windows-portable.zip ]; then
            unzip artifacts/axolotl-apclient-windows-portable.zip -d native_temp
            mv native_temp/axolotl-apclient.exe release_assets/AxolotlAPTextClient-Windows-nightly.exe
          fi

      - name: GH Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          body: |
            Automated development builds of the Axolotl Archipelago Text Client.

            **Direct Downloads**:
            - [Linux AppImage](https://github.com/${{ github.repository }}/releases/download/nightly/AxolotlAPTextClient-Linux-x86_64-nightly.AppImage)
            - [Linux Flatpak](https://github.com/${{ github.repository }}/releases/download/nightly/com.mooinglemur.axolotl-nightly.flatpak)
            - [macOS DMG](https://github.com/${{ github.repository }}/releases/download/nightly/AxolotlAPTextClient-macOS-nightly.dmg)
            - [Windows MSI](https://github.com/${{ github.repository }}/releases/download/nightly/AxolotlAPTextClient-Windows-nightly.msi)
            - [Windows EXE (Portable)](https://github.com/${{ github.repository }}/releases/download/nightly/AxolotlAPTextClient-Windows-nightly.exe)
          files: release_assets/*
          prerelease: true
          make_latest: false
