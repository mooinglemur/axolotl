name: Release

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly builds at midnight on Sunday
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yml

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Rename and Prepare Assets
        run: |
          mkdir -p release_assets
          # Move and rename assets for clarity
          mv artifacts/*.AppImage release_assets/AxolotlAPTextClient-Linux-x86_64.AppImage || true
          mv artifacts/*.flatpak release_assets/AxolotlAPTextClient-Linux.flatpak || true
          mv artifacts/*.dmg release_assets/AxolotlAPTextClient-macOS.dmg || true
          # For Windows
          find artifacts -name "*.msi" -exec mv {} release_assets/ \;
          find artifacts -name "*-portable.zip" -exec mv {} release_assets/ \;
          # Also try to grab the raw exe from windows-cross zip if we want a direct exe download
          if [ -f artifacts/axolotl-apclient-windows-cross-portable.zip ]; then
            unzip artifacts/axolotl-apclient-windows-cross-portable.zip -d cross_temp
            mv cross_temp/axolotl-apclient.exe release_assets/AxolotlAPTextClient-Windows-x64.exe
          fi

      - name: GH Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Development Build
          body: |
            Automated development builds of the Axolotl Archipelago Text Client.

            **Direct Downloads**:
            - [Linux AppImage](https://github.com/${{ github.repository }}/releases/download/nightly/AxolotlAPTextClient-Linux-x86_64.AppImage)
            - [Linux Flatpak](https://github.com/${{ github.repository }}/releases/download/nightly/AxolotlAPTextClient-Linux.flatpak)
            - [macOS DMG](https://github.com/${{ github.repository }}/releases/download/nightly/AxolotlAPTextClient-macOS.dmg)
            - [Windows MSI](https://github.com/${{ github.repository }}/releases/download/nightly/axolotl-apclient-cross.msi)
            - [Windows EXE (Portable)](https://github.com/${{ github.repository }}/releases/download/nightly/AxolotlAPTextClient-Windows-x64.exe)
          files: release_assets/*
          prerelease: true
          make_latest: false
