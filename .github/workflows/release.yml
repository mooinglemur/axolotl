name: Release

on:
  schedule:
    - cron: '5 7 * * *' # Nightly builds at 7:05 AM UTC
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yml

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Rename and Prepare Assets
        run: |
          sudo apt-get install -y unzip
          mkdir -p release_assets
          # Move and rename assets for clarity and include 'nightly' in filenames
          # Use find to be robust against varying generated names
          find artifacts -name "Axolotl*.AppImage" -exec cp {} release_assets/AxolotlAPTextClient-Linux-x86_64-nightly.AppImage \; || true
          find artifacts -name "*.flatpak" -exec cp {} release_assets/com.mooinglemur.axolotl-nightly.flatpak \; || true
          find artifacts -name "*.dmg" -exec cp {} release_assets/AxolotlAPTextClient-macOS-nightly.dmg \; || true

          # For Windows
          # MSIs
          find artifacts -name "*.msi" -exec cp {} release_assets/AxolotlAPTextClient-Windows-nightly.msi \; || true

          # Portable EXE
          # We prefer the one from windows-cross as it's definitely a single static binary
          if [ -f artifacts/axolotl-apclient-windows-cross-portable.zip ]; then
            unzip artifacts/axolotl-apclient-windows-cross-portable.zip -d cross_temp
            mv cross_temp/axolotl-apclient.exe release_assets/AxolotlAPTextClient-Windows-nightly.exe
          elif [ -f artifacts/axolotl-apclient-windows-portable.zip ]; then
            unzip artifacts/axolotl-apclient-windows-portable.zip -d native_temp
            mv native_temp/axolotl-apclient.exe release_assets/AxolotlAPTextClient-Windows-nightly.exe
          fi

      - name: Get Date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create GH Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: nightly-${{ steps.date.outputs.date }}
          name: Nightly Build - ${{ steps.date.outputs.date }}
          body: |
            Automated development builds of the Axolotl Archipelago Text Client.

            **Direct Downloads**:
            - [Linux AppImage](https://github.com/${{ github.repository }}/releases/download/nightly-${{ steps.date.outputs.date }}/AxolotlAPTextClient-Linux-x86_64-nightly.AppImage)
            - [Linux Flatpak](https://github.com/${{ github.repository }}/releases/download/nightly-${{ steps.date.outputs.date }}/com.mooinglemur.axolotl-nightly.flatpak)
            - [macOS DMG](https://github.com/${{ github.repository }}/releases/download/nightly-${{ steps.date.outputs.date }}/AxolotlAPTextClient-macOS-nightly.dmg)
            - [Windows MSI](https://github.com/${{ github.repository }}/releases/download/nightly-${{ steps.date.outputs.date }}/AxolotlAPTextClient-Windows-nightly.msi)
            - [Windows EXE (Portable)](https://github.com/${{ github.repository }}/releases/download/nightly-${{ steps.date.outputs.date }}/AxolotlAPTextClient-Windows-nightly.exe)
          artifacts: release_assets/*
          prerelease: true
          replacesArtifacts: true
          omitBodyDuringUpdate: false
          omitNameDuringUpdate: false

      - name: Cleanup Old Nightly Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Keep last 14 nightly releases
          RELEASES=$(gh release list --limit 100 --json tagName,name --jq '.[] | select(.name | contains("Nightly Build -")) | .tagName' | sort -r)
          COUNT=0
          for tag in $RELEASES; do
            COUNT=$((COUNT+1))
            if [ $COUNT -gt 14 ]; then
              echo "Deleting old nightly release: $tag"
              gh release delete "$tag" --yes --cleanup-tag
            fi
          done
