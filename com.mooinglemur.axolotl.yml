app-id: com.mooinglemur.axolotl
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: axolotl-apclient
finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
modules:
  - name: yaml-cpp
    buildsystem: cmake-ninja
    config-opts:
      - -DYAML_BUILD_SHARED_LIBS=ON
      - -DYAML_CPP_BUILD_TESTS=OFF
      - -DYAML_CPP_BUILD_TOOLS=OFF
    sources:
      - type: git
        url: https://github.com/jbeder/yaml-cpp.git
        tag: 0.8.0

  - name: nlohmann-json
    buildsystem: cmake-ninja
    config-opts:
      - -DJSON_BuildTests=OFF
    sources:
      - type: git
        url: https://github.com/nlohmann/json.git
        tag: v3.11.2

  - name: glfw
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_SHARED_LIBS=ON
      - -DGLFW_BUILD_EXAMPLES=OFF
      - -DGLFW_BUILD_TESTS=OFF
      - -DGLFW_BUILD_DOCS=OFF
    sources:
      - type: git
        url: https://github.com/glfw/glfw.git
        tag: 3.3.10

  - name: libzip
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_SHARED_LIBS=OFF
      - -DENABLE_BZIP2=OFF
      - -DENABLE_LZMA=OFF
      - -DENABLE_ZSTD=OFF
      - -DENABLE_COMMONCRYPTO=OFF
      - -DENABLE_GNUTLS=OFF
      - -DENABLE_MBEDTLS=OFF
      - -DENABLE_OPENSSL=OFF
    sources:
      - type: git
        url: https://github.com/nih-at/libzip.git
        tag: v1.10.1

  - name: axolotl-apclient
    buildsystem: cmake-ninja
    post-install:
      - install -Dm644 com.mooinglemur.axolotl.desktop /app/share/applications/com.mooinglemur.axolotl.desktop
      - install -Dm644 com.mooinglemur.axolotl.png /app/share/icons/hicolor/128x128/apps/com.mooinglemur.axolotl.png
    sources:
      - type: dir
        path: .
